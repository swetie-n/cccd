<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giao diện Căn cước</title>
    <style>
        /* Reset cơ bản cho di động */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Khung chứa giả lập tỷ lệ 1080x2165 */
        .phone-viewport {
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 100vh;
            position: relative;
            background-color: #fff;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* ===== MÀN HÌNH 1 ===== */
        #screen1 {
            background-color: #f7f9fa;
        }

        .img-full {
            width: 100%;
            height: 100%;
            object-fit: fill; 
            display: block;
        }

        /* Vùng bấm tàng hình đè lên nút "Căn cước điện tử" ở ảnh 1 */
        .click-area-ccdt {
            position: absolute;
            top: 53.5%; 
            left: 4%;
            width: 92%;
            height: 6%;
            background: rgba(255, 0, 0, 0); 
            border-radius: 8px;
            cursor: pointer;
            z-index: 10;
        }

        /* Hiệu ứng tỏa ra liên tục (Đã xóa ngôi sao ở giữa) */
        .star-effect-container {
            position: absolute;
            top: 20%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            pointer-events: none;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .star-wave {
            position: absolute;
            border: 1.5px solid rgba(230, 33, 23, 0.6); 
            border-radius: 50%;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: waveOut 2.5s infinite linear;
        }

        /* Chỉnh lại độ trễ cho các sóng do đã xóa phần tử đầu tiên */
        .star-wave:nth-child(1) { animation-delay: 0s; }
        .star-wave:nth-child(2) { animation-delay: 1.25s; }

        @keyframes waveOut {
            0% { width: 20px; height: 20px; opacity: 0; }
            10% { opacity: 0.6; }
            60% { opacity: 0.1; }
            100% { width: 120px; height: 120px; opacity: 0; } 
        }

        /* ===== MÀN HÌNH 2 (CÓ THỂ CUỘN) ===== */
        #screen2 {
            overflow-y: auto; 
            background-color: #f4f6f8;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; 
        }

        #screen2::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .scroll-wrapper {
            width: 100%;
            position: relative;
        }

        .img-scroll {
            width: 100%;
            height: auto; 
            display: block;
        }

        /* Vùng bấm tàng hình nút quay lại */
        .click-area-back {
            position: absolute;
            top: 1.5%;
            left: 2%;
            width: 12%;
            height: 4%;
            background: rgba(0, 0, 255, 0); 
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="phone-viewport">
        
        <div id="screen1" class="screen active">
            <img src="1000054051.png" alt="Ảnh gốc 1" class="img-full">
            
            <div class="star-effect-container">
                <div class="star-wave"></div>
                <div class="star-wave"></div>
            </div>

            <div class="click-area-ccdt" id="btnGo"></div>
        </div>

        <div id="screen2" class="screen">
            <div class="scroll-wrapper">
                <div class="click-area-back" id="btnBack"></div>
                <img src="1000054052.png" alt="Ảnh gốc 2" class="img-scroll">
            </div>
        </div>

    </div>

    <script>
        const s1 = document.getElementById('screen1');
        const s2 = document.getElementById('screen2');
        const btnGo = document.getElementById('btnGo');
        const btnBack = document.getElementById('btnBack');

        btnGo.addEventListener('click', () => {
            s1.classList.remove('active');
            s2.classList.add('active');
            s2.scrollTop = 0; 
        });

        btnBack.addEventListener('click', () => {
            s2.classList.remove('active');
            s1.classList.add('active');
        });
    </script>
</body>
</html>
